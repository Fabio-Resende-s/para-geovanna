<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Para Geovanna ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
            background-size: 400% 400%;
            animation: gradiente 8s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradiente {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Corações flutuantes */
        .heart-float {
            position: absolute;
            font-size: 2rem;
            color: #ff4d6d;
            animation: subir 6s linear infinite;
            pointer-events: none;
            opacity: 0.6;
            user-select: none;
        }

        @keyframes subir {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(720deg);
                opacity: 0;
            }
        }

        /* Cartão principal */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 30px 25px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card h1 {
            font-size: 2.8rem;
            color: #c9184a;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(201, 24, 74, 0.2);
        }

        .card .subtitle {
            font-size: 1rem;
            color: #a4133c;
            margin-bottom: 20px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Slideshow */
        .slideshow-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            margin-bottom: 25px;
            background: #ffe3e8;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            border-radius: 20px;
        }

        .slide.active {
            opacity: 1;
        }

        /* Indicadores (bolinhas) */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #d9d9d9;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.3s, transform 0.3s;
            cursor: pointer;
            border: none;
        }

        .dot.active {
            background: #c9184a;
            transform: scale(1.3);
        }

        /* Mensagem */
        .message-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 18px;
            padding: 18px 20px;
            min-height: 80px;
            border: 1px solid rgba(201, 24, 74, 0.2);
            margin-bottom: 5px;
        }

        #mensagem {
            font-size: 1.2rem;
            color: #2d2d2d;
            line-height: 1.6;
            font-weight: 500;
            min-height: 60px;
        }

        #mensagem .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background: #c9184a;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: piscar 0.8s step-end infinite;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .assinatura {
            margin-top: 18px;
            font-size: 1.1rem;
            color: #a4133c;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .assinatura span {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Responsivo */
        @media (max-width: 500px) {
            .card {
                padding: 20px 15px 30px;
            }
            .card h1 {
                font-size: 2.2rem;
            }
            #mensagem {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Corações flutuantes (gerados por JS) -->

    <div class="card">
        <h1>💗 Geovanna 💗</h1>
        <div class="subtitle">✨ Cada dia ao seu lado é especial ✨</div>

        <!-- Slideshow das 3 fotos -->
        <div class="slideshow-container">
            <div class="slides">
                <!--
                    ⬇️ SUBSTITUA os caminhos abaixo pelas suas 3 fotos da Geovanna
                    Exemplo: "fotos/geovanna1.jpg", "fotos/geovanna2.jpg", "fotos/geovanna3.jpg"
                -->
                <img src="img/imagem.jpeg" alt="Geovanna 1" class="slide active" />
                <img src="https://via.placeholder.com/600x450/ffb3c6/ffffff?text=Foto+2+❤️" alt="Geovanna 2" class="slide" />
                <img src="https://via.placeholder.com/600x450/ffb3c6/ffffff?text=Foto+3+❤️" alt="Geovanna 3" class="slide" />
            </div>
        </div>

        <!-- Indicadores -->
        <div class="indicators">
            <button class="dot active" data-index="0" aria-label="Foto 1"></button>
            <button class="dot" data-index="1" aria-label="Foto 2"></button>
            <button class="dot" data-index="2" aria-label="Foto 3"></button>
        </div>

        <!-- Mensagem -->
        <div class="message-box">
            <div id="mensagem">
                <span class="cursor"></span>
            </div>
        </div>

        <div class="assinatura">
            <span>💖 Com todo meu amor, [Seu nome] 💖</span>
        </div>
    </div>

    <script>
        // ========== 1. Slideshow automático ==========
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;
        let interval;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            showSlide(currentIndex);
        }

        function startSlideshow() {
            if (interval) clearInterval(interval);
            interval = setInterval(nextSlide, 3500);
        }

        // Clique nas bolinhas
        dots.forEach((dot) => {
            dot.addEventListener('click', function() {
                const index = parseInt(this.dataset.index);
                if (index !== currentIndex) {
                    currentIndex = index;
                    showSlide(currentIndex);
                    startSlideshow(); // reinicia o temporizador
                }
            });
        });

        // Inicia o slideshow
        startSlideshow();

        // ========== 2. Efeito de digitação na mensagem ==========
        const mensagemEl = document.getElementById('mensagem');
        const textoCompleto = "Geovanna, você é a pessoa mais incrível que já conheci. Seu sorriso ilumina meus dias e seu amor transforma minha vida. Te amo mais do que palavras podem dizer! 💕";

        let charIndex = 0;
        let isDeleting = false; // só para efeito, mas aqui vamos só digitar

        function typeMessage() {
            if (charIndex < textoCompleto.length) {
                // Remove o cursor temporariamente, adiciona caractere, recoloca o cursor
                const cursorSpan = mensagemEl.querySelector('.cursor');
                const textoSemCursor = mensagemEl.textContent.replace('|', ''); // limpa
                mensagemEl.innerHTML = textoCompleto.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeMessage, 50); // velocidade da digitação
            } else {
                // Mensagem completa, cursor pisca normalmente
                // Não faz nada, o cursor já está lá
            }
        }

        // Inicia a digitação após um pequeno atraso
        setTimeout(typeMessage, 800);

        // ========== 3. Corações flutuantes (gerados dinamicamente) ==========
        function criarCoracao() {
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
            heart.style.animationDuration = (5 + Math.random() * 4) + 's';
            heart.style.animationDelay = (Math.random() * 3) + 's';
            document.body.appendChild(heart);

            // Remove após a animação para não acumular
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        // Cria corações a cada 500ms
        setInterval(criarCoracao, 500);

        // Cria alguns imediatamente
        for (let i = 0; i < 6; i++) {
            setTimeout(criarCoracao, i * 200);
        }
    </script>
</body>
</html>

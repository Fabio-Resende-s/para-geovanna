<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Para Geovanna ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
            background-size: 400% 400%;
            animation: gradiente 8s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradiente {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Corações flutuantes */
        .heart-float {
            position: absolute;
            font-size: 2rem;
            color: #ff4d6d;
            animation: subir 6s linear infinite;
            pointer-events: none;
            opacity: 0.6;
            user-select: none;
        }

        @keyframes subir {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(720deg);
                opacity: 0;
            }
        }

        /* Cartão principal */
        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border-radius: 30px;
            padding: 24px 20px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }

        .card h1 {
            font-size: 2.6rem;
            color: #c9184a;
            margin-bottom: 4px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(201, 24, 74, 0.2);
        }

        .card .subtitle {
            font-size: 0.95rem;
            color: #a4133c;
            margin-bottom: 18px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Slideshow */
        .slideshow-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            margin-bottom: 20px;
            background: #ffe3e8;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            border-radius: 20px;
        }

        .slide.active {
            opacity: 1;
        }

        /* Indicadores (bolinhas) */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: -6px;
            margin-bottom: 18px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #d9d9d9;
            border-radius: 50%;
            transition: background 0.3s, transform 0.3s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .dot.active {
            background: #c9184a;
            transform: scale(1.3);
        }

        /* Mensagem - corrigido para quebras e rolagem */
        .message-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 18px;
            padding: 18px 20px;
            border: 1px solid rgba(201, 24, 74, 0.15);
            margin-bottom: 4px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        #mensagem {
            font-size: 1.1rem;
            color: #1e1e1e;
            line-height: 1.7;
            font-weight: 500;
            white-space: pre-wrap;    /* preserva quebras de linha */
            word-wrap: break-word;
            overflow-wrap: break-word;
            min-height: 50px;
        }

        #mensagem .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background: #c9184a;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: piscar 0.8s step-end infinite;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .assinatura {
            margin-top: 16px;
            font-size: 1.05rem;
            color: #a4133c;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .assinatura span {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* Responsivo */
        @media (max-width: 500px) {
            .card {
                padding: 18px 14px 24px;
            }
            .card h1 {
                font-size: 2.2rem;
            }
            .card .subtitle {
                font-size: 0.85rem;
            }
            #mensagem {
                font-size: 0.95rem;
                line-height: 1.6;
            }
            .message-box {
                padding: 14px 16px;
                max-height: 250px;
            }
            .assinatura {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 380px) {
            .card h1 {
                font-size: 1.8rem;
            }
            #mensagem {
                font-size: 0.85rem;
            }
            .message-box {
                max-height: 200px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Corações flutuantes (gerados por JS) -->

    <div class="card">
        <h1>💗 Geovanna 💗</h1>
        <div class="subtitle">✨ Cada dia as mensagens ficar mais interessantes ✨</div>

        <!-- Slideshow das 3 fotos -->
        <div class="slideshow-container">
            <div class="slides">
                <!-- Substitua pelos caminhos das suas fotos -->
                <img src="./img/imagem1.jpg" alt="Geovanna 1" class="slide active" />
                <img src="./img/imagem 12.jpeg" alt="Geovanna 2" class="slide" />
                <img src="./img/imagem14.jpeg" alt="Geovanna 3" class="slide" />
            </div>
        </div>

        <!-- Indicadores -->
        <div class="indicators">
            <button class="dot active" data-index="0" aria-label="Foto 1"></button>
            <button class="dot" data-index="1" aria-label="Foto 2"></button>
            <button class="dot" data-index="2" aria-label="Foto 3"></button>
        </div>

        <!-- Mensagem -->
        <div class="message-box">
            <div id="mensagem">
                <span class="cursor"></span>
            </div>
        </div>

        <div class="assinatura">
            <span>💖 Com todo meu carinho, Fábio Resende 💖</span>
        </div>
    </div>

    <script>
        // ========== 1. Slideshow automático ==========
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;
        let interval;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            showSlide(currentIndex);
        }

        function startSlideshow() {
            if (interval) clearInterval(interval);
            interval = setInterval(nextSlide, 3500);
        }

        dots.forEach((dot) => {
            dot.addEventListener('click', function() {
                const index = parseInt(this.dataset.index);
                if (index !== currentIndex) {
                    currentIndex = index;
                    showSlide(currentIndex);
                    startSlideshow();
                }
            });
        });

        startSlideshow();

        // ========== 2. Efeito de digitação com suporte a quebras de linha ==========
        const mensagemEl = document.getElementById('mensagem');

        const textoCompleto = `Não sei qual foi a primeira mensagem que te mandei, mas sei que ela mudou muita coisa na minha vida. ❤️

        Desde aquele dia, cada conversa, cada risada e cada momento com você foi se tornando especial.

        Em pouco mais de um mês, você conquistou um lugar enorme no meu coração. Nunca imaginei que uma simples conversa no Facebook me levaria a conhecer uma pessoa tão maravilhosa.

        Você é carinhosa, linda, especial e faz meus dias muito mais felizes. Obrigado por estar ao meu lado e por fazer parte da minha vida.

        Espero que essa seja apenas a primeira página de uma história linda que ainda vamos escrever juntos.

        Te amo, Geovanna! ❤️🥹`;

        let charIndex = 0;
        let typingTimeout = null;

        function typeMessage() {
            if (charIndex < textoCompleto.length) {
                const currentChar = textoCompleto[charIndex];
                let htmlContent = '';

                // Pega o texto já digitado (sem o cursor)
                const currentText = textoCompleto.substring(0, charIndex + 1);
                // Substitui quebras de linha por <br>
                const textWithBreaks = currentText.replace(/\n/g, '<br>');
                htmlContent = textWithBreaks + '<span class="cursor"></span>';

                mensagemEl.innerHTML = htmlContent;
                charIndex++;

                // Rola para o final automaticamente se o texto ultrapassar a altura
                const messageBox = mensagemEl.closest('.message-box');
                if (messageBox) {
                    messageBox.scrollTop = messageBox.scrollHeight;
                }

                typingTimeout = setTimeout(typeMessage, 40); // velocidade ajustada
            } else {
                // Mensagem completa – mantém o cursor piscando
                mensagemEl.innerHTML = textoCompleto.replace(/\n/g, '<br>') + '<span class="cursor"></span>';
            }
        }

        // Inicia após um breve atraso
        setTimeout(typeMessage, 600);

        // ========== 3. Corações flutuantes ==========
        function criarCoracao() {
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            heart.textContent = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
            heart.style.animationDuration = (5 + Math.random() * 4) + 's';
            heart.style.animationDelay = (Math.random() * 3) + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        setInterval(criarCoracao, 500);
        for (let i = 0; i < 6; i++) {
            setTimeout(criarCoracao, i * 200);
        }
    </script>
</body>
</html>
